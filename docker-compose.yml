services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      DB_DRIVER: mysql
      DB_HOST: db
      DB_USER: secretrepublic
      DB_PASS: secretrepublic
      DB_NAME: secretrepublic
      DB_PORT: 3306
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: secretrepublic
      MYSQL_USER: secretrepublic
      MYSQL_PASSWORD: secretrepublic
      MYSQL_ROOT_PASSWORD: rootsecret
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./includes/install/DB.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
